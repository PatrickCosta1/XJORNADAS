services:
  - type: web
    name: jornadas26-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true

  - type: cron
    name: jornadas26-keepalive
    runtime: node
    rootDir: server
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: npm run keepalive:ping
    envVars:
      - key: KEEPALIVE_URL
        sync: false
